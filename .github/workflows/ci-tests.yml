name: Final-Project CI/CD Pipeline

on:
  push:
    branches: [ main, develop]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    

env:
  PYTHON_VERSION: '3.10'
  USER_SERVICE_PORT: 3001
  PRODUCT_SERVICE_PORT: 3002
  STAGING_USER_PORT: 4001
  STAGING_PRODUCT_PORT: 4002
  STAGING_USER_MYSQL_PORT: 4308
  STAGING_PRODUCT_MYSQL_PORT: 4309
  STAGING_MYSQL_PORT: 3306
  STAGING_USER_MYSQL_DB: 'user_staging'
  STAGING_PRODUCT_MYSQL_DB: 'product_staging'
  STAGING_USER_MYSQL_USER: 'staging_user'
  STAGING_PRODUCT_MYSQL_USER: 'staging_product_user'

jobs:
  #Job 1 - Unit tests
  dev-unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/development_requirements.txt
      
      - name: Run unit tests
        run: |
          pytest tests/user/test_unit.py tests/user/test_validators.py -v
          pytest tests/product/test_product_unit.py tests/product/test_product_validator.py -v
      
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            user-service/.coverage
            product-service/.coverage
  #job 2 - integration tests
  dev-integration-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        mysql_version: ['8.0']
    services:
      mysql-user:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test_root_password_123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mysql-product:
        image: mysql:${{ matrix.mysql_version }}
        env:
          MYSQL_ROOT_PASSWORD: test_root_password_123
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create test env file
        run: |
          cat > .env.test << EOF
          SECRET_KEY=test_fallback_secret_key_123
          USER_MYSQL_HOST=localhost
          USER_MYSQL_USER=test_user
          USER_MYSQL_PASSWORD=test_password_123
          USER_MYSQL_DB=auth_test
          USER_MYSQL_PORT=3306
          PRODUCT_MYSQL_HOST=localhost
          PRODUCT_MYSQL_USER=product_test_user
          PRODUCT_MYSQL_PASSWORD=test_password_123
          PRODUCT_MYSQL_DB=products_test
          PRODUCT_MYSQL_PORT=3307
          USER_SERVICE_URL=http://localhost:${{ env.USER_SERVICE_PORT }}
          PRODUCT_SERVICE_URL=http://localhost:${{ env.PRODUCT_SERVICE_PORT }}
          FLASK_ENV=test
          TESTING=True
          TEST_VALID_PASSWORD=StrongPass123!
          TEST_WRONG_PASSWORD=Wrongpassword@123
          TEST_WEAK_PASSWORD='short,noupper123,NOLOWER123,NoNumber,,  ,NoSpecial123'
          TEST_STRONG_PASSWORD=StrongPass@123
          TEST_DEFAULT_PASSWORD=Test@1234
          PRODUCT_TEST_PASSWORD=Product@123
          FUNCTIONAL_TEST_PASSWORD=FuncTest@123
          EOF
      
      - name: Initialize databases
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -ptest_root_password_123 < user-service/init_test.sql
          mysql -h127.0.0.1 -P3307 -uroot -ptest_root_password_123 < product-service/product_init_test.sql
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/development_requirements.txt
      
      - name: Start user-service
        working-directory: ./user-service
        env:
          USER_SERVICE_PORT: ${{ env.USER_SERVICE_PORT }}
        run: |
          echo "Starting user-service..."
          python3 app.py &
          sleep 10
      
      - name: Start product-service
        working-directory: ./product-service
        env:
          PRODUCT_SERVICE_PORT: ${{ env.PRODUCT_SERVICE_PORT }}
          USER_SERVICE_URL: http://localhost:${{ env.USER_SERVICE_PORT }}
        run: |
          echo "Starting product-service..."
          python3 product_app.py &
          sleep 10
      
      - name: Verify services are running
        run: |
          curl -f http://localhost:${{ env.USER_SERVICE_PORT }}/health || exit 1
          curl -f http://localhost:${{ env.PRODUCT_SERVICE_PORT }}/health || exit 1
          echo "Both services are healthy"

      - name: Run integration tests
        run: |
            pytest tests/user/test_integration.py -v
            pytest tests/product/test_product_integration.py -v

  # job 3 - build images for staging and production
  dev-build-images:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
    needs: [dev-unit-tests, dev-integration-tests]
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push user-service
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest -f user-service/Dockerfile ./user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest
      
      - name: Build and push product-service
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest -f product-service/Dockerfile ./product-service
          docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest

  #job 4 - deploy staging
  staging-deploy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
    needs: [dev-build-images]
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: staging
      url: http://localhost:${{ env.STAGING_USER_PORT }} 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker --version
          docker-compose --version

      - name: Increase map_count for SonarQube
        run: |
          sudo sysctl -w vm.max_map_count=262144
          echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
      
      - name: Start SonarQube with docker-compose
        run: |
          docker-compose -f docker-compose.sonarqube.yml up -d
          # Wait for SonarQube to be ready
          for i in {1..60}; do
            if curl -s -f http://localhost:9000 > /dev/null 2>&1; then
              echo "SonarQube is ready"
              break
            fi
            echo "Waiting for SonarQube(${i}/60)"
            sleep 5
          done

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Pull images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/user-service:latest user-service:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/product-service:latest product-service:latest

      - name: Cleanup previous staging runs
        run: |
          docker-compose -f docker-compose.staging.yml down -v 2>/dev/null || true

      - name: Create .env.staging file
        run: |
          cat > .env.staging << EOF
          STAGING_SECRET_KEY=${{ secrets.STAGING_JWT_SECRET || 'staging_fallback_key_123'}}
          STAGING_USER_MYSQL_PASSWORD=${{ secrets.STAGING_USER_DB_PASSWORD || 'staging_user_pass_123'}}
          STAGING_PRODUCT_MYSQL_PASSWORD=${{ secrets.STAGING_PRODUCT_DB_PASSWORD || 'staging_product_pass_123'}}
          STAGING_DB_ROOT_PASSWORD=${{ secrets.STAGING_DB_ROOT_PASSWORD || 'staging_root_pass_123' }}
          STAGING_USER_PORT=${{ env.STAGING_USER_PORT }}
          STAGING_PRODUCT_PORT=${{ env.STAGING_PRODUCT_PORT }}
          STAGING_MYSQL_PORT=${{ env.STAGING_MYSQL_PORT }}
          STAGING_USER_MYSQL_PORT=${{ env.STAGING_USER_MYSQL_PORT }}
          STAGING_PRODUCT_MYSQL_PORT=${{ env.STAGING_PRODUCT_MYSQL_PORT }}
          STAGING_USER_MYSQL_DB=${{ env.STAGING_USER_MYSQL_DB }}
          STAGING_PRODUCT_MYSQL_DB=${{ env.STAGING_PRODUCT_MYSQL_DB }}
          STAGING_USER_MYSQL_USER=${{ env.STAGING_USER_MYSQL_USER }}
          STAGING_PRODUCT_MYSQL_USER=${{ env.STAGING_PRODUCT_MYSQL_USER }}
          EOF

      - name: Deploy staging environment with docker-compose
        run: |
          cp requirements/staging_requirements.txt user-service/requirements.txt
          cp requirements/staging_requirements.txt product-service/requirements.txt

          cp -r tests/user user-service/tests
          cp -r tests/product product-service/tests
          ls -la user-service/tests
          ls -la product-service/tests

          docker-compose -f docker-compose.staging.yml --env-file .env.staging up -d --build
          sleep 30

      - name: Verify staging deployment
        run: |
          max_retries=10
          for i in $(seq 1 $max_retries); do
            echo "Attempt $i/$max_retries"
            
            if curl -s -f http://localhost:${{ env.STAGING_USER_PORT }}/health > /dev/null && \
               curl -s -f http://localhost:${{ env.STAGING_PRODUCT_PORT }}/health > /dev/null; then
              echo "Both services are healthy"
              
              # Verificação detalhada
              echo "Detailed health check:"
              curl -s http://localhost:${{ env.STAGING_USER_PORT }}/health | jq .
              curl -s http://localhost:${{ env.STAGING_PRODUCT_PORT }}/health | jq .
              break
            fi
            
            if [ $i -eq $max_retries ]; then
              echo "Services not healthy after $max_retries attempts"
              exit 1
            fi
            
            sleep 10
          done

      - name: Run functional tests in staging environment 
        run: |
          docker-compose -f docker-compose.staging.yml --env-file .env.staging exec -T user-service pytest tests/test_functional.py -v
          docker-compose -f docker-compose.staging.yml --env-file .env.staging exec -T product-service pytest tests/test_product_functional.py -v

      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Bandit Security Scan
        run: bandit -c .bandit -r user-service/ product-service/ --severity-level medium || exit 1
      
      - name: Safety Security Scan
        run: safety check -r requirements/staging_requirements.txt || exit 1
      
      - name: pip-audit Security Scan
        run: pip-audit -r requirements/staging_requirements.txt || exit 1
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
      
      - name: Run Trivy on product-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          trivy-version: v0.69.3
      
      - name: Start SonarQube with docker-compose
        run: |
          docker-compose -f docker-compose.sonarqube.yml up -d
          echo "Waiting for SonarQube to be ready"
          for i in {1..30}; do
            
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/api/system/status || echo "000")
            if [ "$STATUS" = "200" ]; then
              
              HEALTH=$(curl -s http://localhost:9000/api/system/status | jq -r '.status' 2>/dev/null || echo "UNKNOWN")
              if [ "$HEALTH" = "UP" ]; then
                echo "SonarQube is ready (Status: $HEALTH)"
                break
              fi
            fi
            echo "Waiting for SonarQube ($i/30) - HTTP $STATUS"
            sleep 5
          done
    
          # Verificação final
          if ! curl -s -f http://localhost:9000/api/system/status > /dev/null; then
            echo "SonarQube failed to start - skipping scan"
            exit 0
          fi

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # DEBUG: Verificar token
          echo "=== DEBUG ==="
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is NOT SET"
            exit 1
          fi
          echo "SONAR_TOKEN is set (length: ${#SONAR_TOKEN})"
          
          # Testar token na API
          echo "Testing token against SonarQube..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/api/system/info -u "$SONAR_TOKEN:")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Token is valid"
          else
            echo "Token invalid (HTTP $HTTP_CODE)"
            exit 1
          fi
          # Run sonar-scanner
          docker run --rm \
            --network host \
            -v $(pwd):/usr/src \
            -e SONAR_TOKEN=$SONAR_TOKEN \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=projeto-final-devops \
            -Dsonar.sources=user-service,product-service \
            -Dsonar.exclusions=**/tests/**,**/products_tests/**,**/venv/**,**/__pycache__/** \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login=$SONAR_TOKEN
      
      - name: SonarQube URL
        run: |
          echo "SonarQube Dashboard: http://localhost:9000" >> $GITHUB_STEP_SUMMARY
          echo "Login: admin / admin" >> $GITHUB_STEP_SUMMARY
      
      - name: Record deployment
        if: success()
        run: |
          echo "##Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Successful" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo "- User Service: http://localhost:${{ env.STAGING_USER_PORT }}" >> $GITHUB_STEP_SUMMARY
          echo "- Product Service: http://localhost:${{ env.STAGING_PRODUCT_PORT }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.staging.yml down -v
  
  deploy-production:
    runs-on: self-hosted
    needs: [dev-build-images,staging-deploy]
    if:  success() && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://user.local.prod
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/user-service:latest localhost:32000/user-service:1.0.0
          docker tag ${{ secrets.DOCKER_USERNAME }}/product-service:latest localhost:32000/product-service:1.0.0
          docker push localhost:32000/user-service:1.0.0
          docker push localhost:32000/product-service:1.0.0

      - name: Deploy to Kubernetes
        run: ./scripts/prod/deploy-prod.sh

      - name: Verify production
        run: |
          microk8s kubectl get pods -n projeto-final
          curl -s -f http://user.local.prod/health || exit 1
          curl -s -f http://product.local.prod/health || exit 1
