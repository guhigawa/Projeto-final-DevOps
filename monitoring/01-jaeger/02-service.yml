apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
    component: tracing
    service: jaeger
spec:
  selector:
    app: jaeger
  ports:
  - name: jaeger-ui
    port: 16686
    targetPort: 16686
    nodePort: 30001
  - name: jaeger-thrift
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: jaeger-http
    port: 14268
    targetPort: 14268
  type: NodePort
