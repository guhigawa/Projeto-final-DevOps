apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels: 
    app: jaeger
    component: tracing
    service: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels: 
        app: jaeger
        component: tracing 
        service: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.52 
        env:
        - name: COLLECTOR_OTLP_ENABLED # Enable OpenTelemetry Protocol (OTLP) support
          value: "true"
        - name: SPAN_STORAGE_TYPE # Use in-memory storage for simplicity to store spans
          value: "memory"
        ports:
        - containerPort: 16686 # Standard port for Jaeger UI
          name: jaeger-ui
        - containerPort: 6831 # Standard port for jaeger agent defined in app services
          name: jaeger-thrift 
          protocol: UDP
        - containerPort: 14268  # Port to receive spans via HTTP
          name: jaeger-http
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
          
